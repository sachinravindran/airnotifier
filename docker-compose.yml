# Coolify-managed deployment. See coolify.md for setup notes.
# To install the DB schema after first deploy:
#   docker exec -it <airnotifier-container> pipenv run ./install.py

services:
  mongodb:
    image: mongo:4.4 # pinned to match pymongo==3.5.1's supported wire version
    restart: unless-stopped
    environment:
      - MONGO_DATA_DIR=/data/db
      - MONGO_LOG_DIR=/tmp/mongo/mongo.log
    volumes:
      - mongodb-data:/data/db
    command: mongod --logpath=/dev/null
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  airnotifier:
    build: .
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - airnotifier-certs:/var/airnotifier/pemdir
      - airnotifier-logs:/var/log/airnotifier
    expose:
      - "8801"
    environment:
      - MONGO_SERVER=mongodb
      - MONGO_PORT=27017
      # Coolify magic variable: auto-generates a domain routed to this port.
      # Remove and set the domain manually in the Coolify UI if you'd rather not use it.
      - SERVICE_FQDN_AIRNOTIFIER_8801
    healthcheck:
      test: ["CMD", "curl", "-sf", "-o", "/dev/null", "http://localhost:8801/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  mongodb-data:
  airnotifier-certs:
  airnotifier-logs:
